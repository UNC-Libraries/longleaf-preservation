name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ['3.1', 'jruby-9.4']
        db: [sqlite, postgres]

    name: Test with Ruby ${{ matrix.ruby-version }} / ${{ matrix.db }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: longleaf_test
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      BUNDLE_WITH: ${{ matrix.db == 'postgres' && 'postgres' || '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler: 2.2.18
          bundler-cache: true

      - name: Install dependencies
        run: bin/setup

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Run tests
        env:
          TEST_DATABASE: ${{ matrix.db }}
          TEST_PG_URL: postgres://postgres:postgres@localhost/longleaf_test
        run: |
          mkdir -p tmp/test-results
          bundle exec rspec \
            --format progress \
            --format RspecJunitFormatter \
            --out tmp/test-results/rspec.xml \
            spec

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: RSpec Tests (Ruby ${{ matrix.ruby-version }} / ${{ matrix.db }})
          path: tmp/test-results/rspec.xml
          reporter: java-junit

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-ruby-${{ matrix.ruby-version }}-${{ matrix.db }}
          path: coverage